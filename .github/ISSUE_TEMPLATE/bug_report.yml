name: Bug Report
description: Report an incorrect behavior or regression.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal code or commands that reproduce the issue.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Package version, Python version, PyTorch version, CUDA/Triton if relevant.
    validations:
      required: false
