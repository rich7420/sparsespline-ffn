name: Feature Request
description: Propose an integration, kernel, API, or benchmark improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: What tests, benchmarks, or acceptance criteria should prove it works?
    validations:
      required: false
