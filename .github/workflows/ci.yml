name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  COVERAGE_FILE: /tmp/sparsespline_ffn.coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check --no-cache src tests examples benchmarks

      - name: Type check
        run: python -m mypy

      - name: Test
        run: |
          python -m pytest \
            --cov=sparsespline_ffn \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Doctest
        run: |
          python -m pytest --doctest-modules src/sparsespline_ffn \
            --ignore=src/sparsespline_ffn/kernels \
            --ignore=src/sparsespline_ffn/__main__.py \
            -p no:cacheprovider

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

      - name: Bench smoke
        run: python benchmarks/run_all.py --smoke

      - name: Build wheel
        run: python -m build

      - name: Smoke test built wheel
        run: |
          python -m pip install --force-reinstall --no-deps dist/sparsespline_ffn-*.whl
          python -c "import sparsespline_ffn; print(sparsespline_ffn.__version__)"
