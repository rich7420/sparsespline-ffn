name: Release

# Builds the wheel + sdist on a version tag and (optionally) publishes to
# PyPI via Trusted Publishing.  Manual publishing remains possible via the
# ``workflow_dispatch`` trigger.
#
# Setup notes:
#   1. Create a PyPI Trusted Publisher entry that maps this repository
#      and the workflow file ``release.yml`` to the project name
#      ``sparsespline-ffn``.  See https://docs.pypi.org/trusted-publishers/.
#   2. After the tag push, the ``publish`` job runs only if the
#      ``RELEASE_PUBLISH`` repository variable is set to ``true``.  This
#      gates accidental publishes — the build job always runs and the
#      artifacts are uploaded so a maintainer can inspect them first.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build deps
        run: python -m pip install --upgrade pip build

      - name: Build
        run: python -m build

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(python -c "import tomllib, pathlib; \
            print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pyproject.toml version $PKG_VERSION != tag $TAG_VERSION"
            exit 1
          fi

      - name: Smoke install
        run: |
          python -m pip install --force-reinstall --no-deps dist/sparsespline_ffn-*.whl
          python -c "import sparsespline_ffn; print(sparsespline_ffn.__version__)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sparsespline-ffn-dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && vars.RELEASE_PUBLISH == 'true'
    permissions:
      id-token: write     # required for PyPI Trusted Publishing
    environment:
      name: pypi
      url: https://pypi.org/p/sparsespline-ffn
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: sparsespline-ffn-dist
          path: dist/

      - name: Publish via Trusted Publisher
        uses: pypa/gh-action-pypi-publish@release/v1
